name: Deploy widget-server image to Dockerhub
on:
# INFO: Disabled push trigger
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        id: login-dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tag
        id: generate-tag
        run: |
          SHA_IMAGE_TAG=$(echo $GITHUB_SHA | head -c7)
          echo "sha_image_tag=$SHA_IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push image to Amazon ECR
        id: build-push-image
        env:
          SHA_IMAGE_TAG: ${{ steps.generate-tag.outputs.sha_image_tag }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          PUSH_IMAGE_URL="${DOCKERHUB_REPOSITORY}:${SHA_IMAGE_TAG}"
          echo "Building image with tag: $PUSH_IMAGE_URL"
          docker build -t "$PUSH_IMAGE_URL" .
          docker push "$PUSH_IMAGE_URL"